[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "marchward"
version = "0.1.4"
description = "Marchward: runtime authority for AI agents. Gate every tool call through cost caps, approval gates, and a tamper-evident audit log."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "Apache-2.0" }
authors = [{ name = "Marchward", email = "team@marchward.ai" }]
keywords = ["ai", "agents", "governance", "langgraph", "langchain", "audit", "cost-cap", "human-in-the-loop"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Topic :: Security",
]
dependencies = []  # stdlib-only (urllib): zero runtime deps by design

[project.urls]
Homepage = "https://marchward.ai"
Documentation = "https://marchward.ai/docs"
Source = "https://github.com/marchward/marchward"
Changelog = "https://github.com/marchward/marchward/releases"

[tool.hatch.build.targets.wheel]
packages = ["src/marchward"]
